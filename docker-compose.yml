version: '3.8'

services:
  # 1. Vulnerable Web Application (The target)
  vulnerable-app:
    image: vulnerables/web-dvwa
    container_name: vulnerable-target
    ports:
      - "8080:80"
    networks:
      - ai-network

  # 2. PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellmdb
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellmdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  # 3. Redis
  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 500mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. LiteLLM Gateway
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://litellm:litellm@postgres:5432/litellmdb
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
      - ./mem0_hook.py:/app/mem0_hook.py
      - ./qdrant_db:/app/qdrant_db
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      - ai-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  redis_data:
  pg_data:
  qdrant_data:

networks:
  ai-network:
    driver: bridge
