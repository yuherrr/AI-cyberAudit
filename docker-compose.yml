version: '3.8'

services:
  vulnerable-app:
    image: vulnerables/web-dvwa
    container_name: vulnerable-target
    ports:
      - "8080:80"
    networks:
      - ai-network

  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - ai-network

  postgres:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellmdb
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellmdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 500mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - ai-network

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - DATABASE_URL=postgresql://litellm:litellm@postgres:5432/litellmdb
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      - ai-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  pentagi:
    image: vxcontrol/pentagi
    container_name: pentagi
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      - OPENAI_BASE_URL=http://litellm:4000/v1
      - TARGET_URL=http://vulnerable-app
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - BUDGET_LIMIT=0.50
    networks:
      - ai-network
    depends_on:
      - vulnerable-app
      - litellm
      - neo4j

volumes:
  redis_data:
  pg_data:
  neo4j_data:
  neo4j_logs:

networks:
  ai-network:
    driver: bridge